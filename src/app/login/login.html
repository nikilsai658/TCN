
    <form class="mt-6 space-y-5" [formGroup]="loginForm" (ngSubmit)="login()">
      <img src="../../assets/images/logo.jpeg" alt="Logo" class="h-20 w-auto mx-auto mb-2 rounded-md">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Email
        </label>
        <input
          type="email"
          formControlName="email"
          placeholder="Enter Email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Password
        </label>
        <input
          formControlName="password"
          type="password"
          placeholder="password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <div class="flex justify-end">
        <a  (click)="forgotpassword()" class="text-sm text-black hover:text-blue-600 hover:underline hover:cursor-pointer">
          Forgot password?
        </a>
      </div>
      <button
        type="submit"
        class="w-full bg-[#24c0c5] text-white py-2 rounded-lg font-medium hover:bg-[#28585ac8] transition"
      >
         Login 
      </button>
      <p class="text-red-500">{{ msg }}</p>
      <div class="flex justify-center items-center mt-4">
        <a  (click)="selectInstitution()" class="text-sm text-black hover:text-blue-600 hover:underline hover:cursor-pointer">
         Select Your Institutions
        </a>
      </div>
    </form>
