<form
  class="mt-6 space-y-5 w-full max-w-md mx-auto px-4 sm:px-6 md:px-0"
  [formGroup]="loginForm"
  (ngSubmit)="login()"
>

  <!-- Logo -->
  <img
    src="../../assets/images/logo.jpeg"
    alt="Logo"
    class="h-16 sm:h-20 w-auto mx-auto mb-2 rounded-md"
  >

  <!-- Email -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">
      Email
    </label>

    <input
      type="email"
      formControlName="email"
      placeholder="Enter Email"
      class="w-full px-4 py-3 sm:py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base"
    />
  </div>

  <!-- Password -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">
      Password
    </label>

    <input
      type="password"
      formControlName="password"
      placeholder="Enter Password"
      class="w-full px-4 py-3 sm:py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base"
    />
  </div>

  <!-- Forgot Password -->
  <div class="flex justify-end">
    <a
      (click)="forgotpassword()"
      class="text-sm text-black hover:text-blue-600 hover:underline hover:cursor-pointer"
    >
      Forgot Password?
    </a>
  </div>

  <!-- Login Button -->
  <button
    type="submit"
    class="w-full bg-[#24c0c5] text-white py-3 sm:py-2 rounded-lg font-medium hover:bg-[#28585ac8] transition duration-300"
  >
    Login
  </button>

  <!-- Error -->
  <p class="text-red-500 text-sm text-center break-words">
    {{ msg }}
  </p>

  <!-- Institution -->
  <div class="flex justify-center items-center text-center">
    <a
      (click)="selectInstitution()"
      class="text-sm text-black hover:text-blue-600 hover:underline hover:cursor-pointer"
    >
      Select Your Institutions
    </a>
  </div>

</form>
