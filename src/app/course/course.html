<div class="text-center mt-10 px-4">

    <!-- Heading -->
    <div class="my-2">
        <h1 class="text-3xl md:text-4xl font-bold text-black py-2">
            Course Curriculum
        </h1>

        <p class="text-gray-500 text-sm md:text-base">
            Learn to build, deploy, and manage AI Agents with ServiceNow
        </p>
    </div>

    <!-- Course Buttons -->
    <div class="my-10 md:my-20 space-y-5" id="course">

        <!-- Python -->
        <div class="flex justify-center">
            <div
                (click)="python()"
                class="hover:cursor-pointer flex items-center justify-between
                       w-full sm:w-[500px] md:w-[650px]
                       px-5 md:px-6
                       py-3 md:py-2
                       rounded-full
                       bg-[#2F3E46]
                       text-white
                       text-base md:text-lg
                       font-bold
                       hover:bg-[#3d5058]
                       transition">

                <span class="flex-1 text-center">
                    PYTHON
                </span>

                <span class="text-xl md:text-2xl">
                    ›
                </span>

            </div>
        </div>

        <!-- Java -->
        <div class="flex justify-center">
            <div
                (click)="java()"
                class="hover:cursor-pointer flex items-center justify-between
                       w-full sm:w-[500px] md:w-[650px]
                       px-5 md:px-6
                       py-3 md:py-2
                       rounded-full
                       bg-[#2F3E46]
                       text-white
                       text-base md:text-lg
                       font-bold
                       hover:bg-[#3d5058]
                       transition">

                <span class="flex-1 text-center">
                    JAVA
                </span>

                <span class="text-xl md:text-2xl">
                    ›
                </span>

            </div>
        </div>

        <!-- DSA -->
        <div class="flex justify-center">
            <div
                (click)="dsa()"
                class="hover:cursor-pointer flex items-center justify-between
                       w-full sm:w-[500px] md:w-[650px]
                       px-5 md:px-6
                       py-3 md:py-2
                       rounded-full
                       bg-[#2F3E46]
                       text-white
                       text-base md:text-lg
                       font-bold
                       hover:bg-[#3d5058]
                       transition">

                <span class="flex-1 text-center">
                    DSA
                </span>

                <span class="text-xl md:text-2xl">
                    ›
                </span>

            </div>
        </div>

        <!-- SQL -->
        <div class="flex justify-center">
            <div
                (click)="sql()"
                class="hover:cursor-pointer flex items-center justify-between
                       w-full sm:w-[500px] md:w-[650px]
                       px-5 md:px-6
                       py-3 md:py-2
                       rounded-full
                       bg-[#2F3E46]
                       text-white
                       text-base md:text-lg
                       font-bold
                       hover:bg-[#3d5058]
                       transition">

                <span class="flex-1 text-center">
                    SQL
                </span>

                <span class="text-xl md:text-2xl">
                    ›
                </span>

            </div>
        </div>

    </div>

</div>
