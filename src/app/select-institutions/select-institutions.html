<form class="mt-6 space-y-5 w-full max-w-md mx-auto px-4 sm:px-6 md:px-0">

    <!-- Logo -->
    <div class="flex justify-center">
        <img
            src="../../assets/images/logo.jpeg"
            alt="Logo"
            class="h-16 sm:h-20 w-auto rounded-md">
    </div>

    <!-- Heading -->
    <h1 class="text-center font-bold text-xl sm:text-2xl text-[#2F3E46]">
        Select Your Institution
    </h1>

    <!-- Institution -->
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
            Select College
        </label>

        <select
            class="w-full px-4 py-3 sm:py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base">

            <option value="">
                Select Institution
            </option>

            <option>
                JAIN University
            </option>
            <option>
                HINDUSTHAN College of Engineering
            </option>
             <option>
               RVS College of ENgineering
            </option>
            <option>
               CMS College of Scienece & Commerce
            </option>

        </select>
    </div>

    <!-- Button -->
    <button
        type="submit"
        (click)="Tologinpage()"
        class="w-full bg-[#24c0c5] text-white py-3 sm:py-2 rounded-lg font-medium hover:bg-[#28585ac8] transition duration-300">
        Go
    </button>

</form>
