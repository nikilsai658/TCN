<div class="h-screen flex flex-col overflow-hidden">

    <!-- Overlay -->
    <div
        *ngIf="sidebarOpen"
        (click)="toggleSidebar()"
        class="fixed inset-0 bg-black/40 z-40">
    </div>

    <!-- Sidebar -->
    <aside
        class="fixed top-0 left-0 h-full w-72 bg-[#2F3E46] text-white shadow-2xl z-50 transform transition-transform duration-300 ease-in-out"
        [class.-translate-x-full]="!sidebarOpen"
        [class.translate-x-0]="sidebarOpen">

        <!-- Sidebar Header -->
        <div class="flex items-center justify-between p-5 border-b border-gray-600">

            <div class="flex items-center gap-3">
                <img
                    src="../../assets/images/logo.jpeg"
                    class="h-12 w-12 rounded-lg">

                <div>
                    <p class="text-xs font-semibold text-gray-300 ">
                        Technex Cloud Networks <br> Pvt Ltd
                    </p>
                </div>
            </div>

            <button
                (click)="toggleSidebar()"
                class="text-2xl hover:text-[#24c0c5]">
                ✕
            </button>

        </div>

        <!-- Sidebar Menu -->

        <nav class="mt-5">

            <a
                routerLink="/courses/courseDash"
                routerLinkActive="bg-[#24c0c5] text-black"
                (click)="toggleSidebar()"
                class="flex items-center gap-4 px-6 py-4 hover:bg-[#3d5058] transition">

                 Dashboard

            </a>

            <a
                routerLink="/courses/leaderboard"
                routerLinkActive="bg-[#24c0c5] text-black"
                (click)="toggleSidebar()"
                class="flex items-center gap-4 px-6 py-4 hover:bg-[#3d5058] transition">

                 Leaderboard

            </a>

            <a
                routerLink="/courses/certificate"
                routerLinkActive="bg-[#24c0c5] text-black"
                (click)="toggleSidebar()"
                class="flex items-center gap-4 px-6 py-4 hover:bg-[#3d5058] transition">

                 Certifications

            </a>

            <a
                routerLink="/courses/faqs"
                routerLinkActive="bg-[#24c0c5] text-black"
                (click)="toggleSidebar()"
                class="flex items-center gap-4 px-6 py-4 hover:bg-[#3d5058] transition">

                 FAQs

            </a>

            <a
                routerLink="/courses/help-support"
                routerLinkActive="bg-[#24c0c5] text-black"
                (click)="toggleSidebar()"
                class="flex items-center gap-4 px-6 py-4 hover:bg-[#3d5058] transition">

                 Help & Support

            </a>

        </nav>

    </aside>

    <!-- HEADER -->

    <header class="bg-[#ffffff] shadow">

        <!-- Top Header -->

        <div class="flex items-center justify-between px-8 py-3">

            <!-- Left -->

            <div class="flex items-center gap-4">

                <!-- Hamburger -->

                <button
                    (click)="toggleSidebar()"
                    class="p-2 rounded-lg hover:bg-gray-200 transition">

                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="w-8 h-8"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor">

                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"/>

                    </svg>

                </button>
                <a routerLink="/courses/courseDash">
                <img
                    src="../../assets/images/jain-logo.png"
                    class="w-28 object-contain">
                </a>
                <div class="h-10 w-px bg-gray-300"></div>

                <a routerLink="/courses/courseDash">
                    <img
                    src="../../assets/images/logo.jpeg"
                    class="h-12 w-12 rounded-lg object-cover">
                </a>

            </div>

            <!-- Right -->

            <div class="flex items-center gap-5">

                <button
                    routerLink="/courses/profile"
                    class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100">

                    <img
                        src="../../assets/images/profile-fill.svg"
                        class="w-9 h-9">

                    <span class="font-semibold text-gray-700">

                        Santhosh

                    </span>

                </button>

                <a
                    routerLink="/auth/login"
                    class="px-5 py-2 rounded-lg bg-[#2F3E46] text-white font-semibold hover:bg-[#435861]">

                    Logout

                </a>

            </div>

        </div>

    </header>

    <!-- Page -->

    <main class="flex-1 overflow-auto bg-gray-100">

        <router-outlet></router-outlet>

    </main>

</div>
