<div class="h-screen flex flex-col overflow-hidden">

    <!-- Overlay -->
    <div
        *ngIf="sidebarOpen"
        (click)="toggleSidebar()"
        class="fixed inset-0 bg-black/40 z-40 lg:hidden">
    </div>

    <!-- Sidebar -->
    <aside
        class="fixed top-0 left-0 h-full w-64 sm:w-72 bg-[#2F3E46] text-white shadow-2xl z-50 transform transition-transform duration-300 ease-in-out"
        [class.-translate-x-full]="!sidebarOpen"
        [class.translate-x-0]="sidebarOpen">

        <!-- Sidebar Header -->
        <div class="flex items-center justify-between p-5 border-b border-gray-600">

            <div class="flex items-center gap-3">

                <img
                    src="../../assets/images/logo.jpeg"
                    class="h-10 w-10 sm:h-12 sm:w-12 rounded-lg">

                <div>

                    <p class="text-xs sm:text-sm font-semibold text-gray-300 leading-5">
                        Technex Cloud Networks
                        <br>
                        Pvt Ltd
                    </p>

                </div>

            </div>

            <button
                (click)="toggleSidebar()"
                class="text-2xl hover:text-[#24c0c5]">

                ✕

            </button>

        </div>

        <!-- Menu -->

        <nav class="mt-5">

            <a
                routerLink="/courses/courseDash"
                routerLinkActive="bg-[#24c0c5] text-black"
                (click)="toggleSidebar()"
                class="block px-6 py-4 hover:bg-[#3d5058] transition">

                Dashboard

            </a>

            <a
                routerLink="/courses/leaderboard"
                routerLinkActive="bg-[#24c0c5] text-black"
                (click)="toggleSidebar()"
                class="block px-6 py-4 hover:bg-[#3d5058] transition">

                Leaderboard

            </a>

            <a
                routerLink="/courses/certificate"
                routerLinkActive="bg-[#24c0c5] text-black"
                (click)="toggleSidebar()"
                class="block px-6 py-4 hover:bg-[#3d5058] transition">

                Certifications

            </a>

            <a
                routerLink="/courses/faqs"
                routerLinkActive="bg-[#24c0c5] text-black"
                (click)="toggleSidebar()"
                class="block px-6 py-4 hover:bg-[#3d5058] transition">

                FAQs

            </a>

            <a
                routerLink="/courses/help-support"
                routerLinkActive="bg-[#24c0c5] text-black"
                (click)="toggleSidebar()"
                class="block px-6 py-4 hover:bg-[#3d5058] transition">

                Help & Support

            </a>

        </nav>

    </aside>

    <!-- Header -->

    <header class="bg-white shadow">

        <div class="flex items-center justify-between px-3 sm:px-6 md:px-8 py-3">

            <!-- Left -->

            <div class="flex items-center gap-2 sm:gap-4">

                <!-- Hamburger -->

                <button
                    (click)="toggleSidebar()"
                    class="p-2 rounded-lg hover:bg-gray-200 transition">

                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="w-6 h-6 sm:w-7 sm:h-7 md:w-8 md:h-8"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor">

                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"/>

                    </svg>

                </button>

                <!-- College Logo -->

                <a routerLink="/courses/courseDash">

                    <img
                        src="../../assets/images/Hindusthan_college.png"
                        class="h-8 sm:h-10 md:h-12 lg:h-14 w-auto object-contain">

                </a>

                <!-- Divider -->

                <div class="hidden md:block h-10 w-px bg-gray-300"></div>

                <!-- Company Logo -->

                <a routerLink="/courses/courseDash">

                    <img
                        src="../../assets/images/logo.jpeg"
                        class="h-9 w-9 sm:h-10 sm:w-10 md:h-12 md:w-12 rounded-lg object-cover">

                </a>

            </div>

            <!-- Right -->

            <div class="flex items-center gap-2 sm:gap-4">

                <!-- Profile -->

                <button
                    routerLink="/courses/profile"
                    class="flex items-center gap-2 px-2 sm:px-3 py-2 rounded-lg hover:bg-gray-100">

                    <img
                        src="../../assets/images/profile-fill.svg"
                        class="w-8 h-8 sm:w-9 sm:h-9">

                    <span class="hidden sm:block font-semibold text-gray-700">

                        Santhosh

                    </span>

                </button>

                <!-- Logout -->

                <a
                    routerLink="/auth/login"
                    class="bg-[#2F3E46] hover:bg-[#435861] text-white font-semibold rounded-lg px-3 sm:px-5 py-2 text-sm sm:text-base transition">

                    Logout

                </a>

            </div>

        </div>

    </header>

    <!-- Main Content -->

    <main class="flex-1 overflow-auto bg-gray-100">

        <router-outlet></router-outlet>

    </main>

</div>
