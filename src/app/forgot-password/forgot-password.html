<form class="mt-6 space-y-5">
    <h1 class="text-center text-2xl font-bold text-[#2F3E46]">Forgot Password</h1>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Email
        </label>
        <input
          type="email"
          placeholder="Enter Email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <button
        type="submit"
        class="w-full bg-[#24c0c5] text-white py-2 rounded-lg font-medium hover:bg-[#28585ac8] transition"
      >
         Recovery Password
      </button>
      <div class="flex justify-center items-center mt-4">
        <a  (click)="Tologinpage()" class="text-sm text-black hover:text-blue-600 hover:underline hover:cursor-pointer">
        < back to login 
        </a>
      </div>
    </form>
