<form class="mt-6 space-y-5 w-full max-w-md mx-auto px-4 sm:px-6 md:px-0">

    <!-- Heading -->
    <h1 class="text-center text-xl sm:text-2xl font-bold text-[#2F3E46]">
        Forgot Password
    </h1>

    <!-- Email -->
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
            Email
        </label>

        <input
            type="email"
            placeholder="Enter Email"
            class="w-full px-4 py-3 sm:py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base"
        />
    </div>

    <!-- Recovery Button -->
    <button
        type="submit"
        class="w-full bg-[#24c0c5] text-white py-3 sm:py-2 rounded-lg font-medium hover:bg-[#28585ac8] transition duration-300"
    >
        Recovery Password
    </button>

    <!-- Back to Login -->
    <div class="flex justify-center items-center text-center">
        <a
            (click)="Tologinpage()"
            class="text-sm text-black hover:text-blue-600 hover:underline hover:cursor-pointer"
        >
            &lt; Back to Login
        </a>
    </div>

</form>
